<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI szótár</title>

<style>
body {
  margin: 0;
  background: #0E0E1A;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  width: 90%;
  max-width: 400px;
}
h1 {
  text-align: center;
  color: #C0B9FF;
}
input, button {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}
button {
  background: #6C5ECC;
  color: white;
}
.result {
  margin-top: 10px;
  padding: 15px;
  background: #1a1a2e;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>AI szótár</h1>

  <input id="input" placeholder="Írj be egy szót..." />
  <button onclick="search()">Keresés</button>
  <button onclick="startVoice()">🎤 Beszéd</button>
  <button onclick="speak()">🔊 Felolvasás</button>

  <div class="result" id="result">Írj be egy szót...</div>
</div>

<script>

const dictionary = {
  api: "Kapcsolat két rendszer között.",
  frontend: "Felhasználó által látott rész.",
  backend: "Háttérben futó logika."
};

let lastText = "";

// FAKE AI (stabil)
function fakeAI(word) {
  return `"${word}" egy informatikai vagy általános kifejezés.

👉 Jelentése a kontextustól függ.
👉 Gyakran valamilyen rendszerhez, folyamathoz vagy technológiához kapcsolódik.

📌 Példa:
A "${word}" használata segít megérteni egy adott rendszer működését.`;
}

// KERESÉS
function search() {
  const word = document.getElementById("input").value.toLowerCase().trim();
  const result = document.getElementById("result");

  if (!word) {
    result.innerText = "Írj be egy szót.";
    return;
  }

  if (dictionary[word]) {
    lastText = dictionary[word];
    result.innerHTML = `<b>${word}</b><br><br>${dictionary[word]}`;
  } else {
    let ai = fakeAI(word);
    lastText = ai;
    result.innerHTML = `<b>${word}</b><br><br>${ai}`;
  }
}

// HANG
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "hu-HU";

  recognition.onresult = function(event) {
    document.getElementById("input").value = event.results[0][0].transcript;
    search();
  };

  recognition.start();
}

// FELolvasás
function speak() {
  if (!lastText) return;
  const speech = new SpeechSynthesisUtterance(lastText);
  speech.lang = "hu-HU";
  speechSynthesis.speak(speech);
}

</script>

</body>
</html>
