<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<title>ai szótár</title>

<style>
body {
  margin: 0;
  background: #0E0E1A;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#suggestions {
  background: #1a1a2e;
  border-radius: 10px;
  margin-top: 5px;
}

.suggestion {
  padding: 10px;
  cursor: pointer;
}

.suggestion:hover {
  background: #6C5ECC;
}
.container {
  width: 90%;
  max-width: 400px;
}

h1 {
  text-align: center;
  color: #C0B9FF;
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: #6C5ECC;
  color: white;
  font-size: 16px;
  margin-bottom: 5px;
}

.result {
  margin-top: 15px;
  padding: 15px;
  background: #1a1a2e;
  border-radius: 10px;
  line-height: 1.5;
}
  .result b {
  color: #C0B9FF;
  font-size: 18px;
}

.result i {
  color: #aaa;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>ai szótár</h1>

  <input id="input" placeholder="Írd be vagy mondd..." />
  <div id="suggestions"></div>
  <button onclick="search()">Keresés</button>
  <button onclick="startVoice()">🎤 Beszéd</button>
  <button onclick="speak()">🔊 Felolvasás</button>

  <div class="result" id="result">Írj vagy mondj egy szót...</div>
</div>

<script>

// OFFLINE SZÓTÁR
const dictionary = {
  "api": {
    meaning: "Kapcsolat két rendszer között.",
    example: "Az app API-n keresztül kér adatot."
  },
  "frontend": {
    meaning: "A felhasználó által látott felület.",
    example: "A gombok a frontend részei."
  },
  "backend": {
    meaning: "A háttérben futó logika.",
    example: "Az adatbázis a backend része."
  },
  "database": {
    meaning: "Adatok tárolására szolgáló rendszer.",
    example: "Az adatokat adatbázisban tároljuk."
  },
  "server": {
    meaning: "Számítógép, ami adatokat szolgáltat.",
    example: "A szerver válaszol a kérésekre."
  },
  "client": {
    meaning: "A felhasználó eszköze vagy alkalmazása.",
    example: "A böngésző egy kliens."
  },
  "bug": {
    meaning: "Hiba a programban.",
    example: "A bug miatt nem működik az app."
  },
  "deploy": {
    meaning: "Alkalmazás élesítése.",
    example: "A kódot deploy-oljuk a szerverre."
  },
  "ui": {
    meaning: "Felhasználói felület.",
    example: "A UI határozza meg a kinézetet."
  },
  "ux": {
    meaning: "Felhasználói élmény.",
    example: "A UX határozza meg a használhatóságot."
  },
  "function": {
    meaning: "Újrahasználható kódrész.",
    example: "A function elvégzi a feladatot."
  },
  "variable": {
    meaning: "Adattároló a programban.",
    example: "A variable értéket tárol."
  },
  "array": {
    meaning: "Lista több adattal.",
    example: "Az array több elemet tartalmaz."
  },
  "object": {
    meaning: "Kulcs-érték párokból álló adat.",
    example: "Az object strukturált adat."
  },
  "loop": {
    meaning: "Ismétlődő végrehajtás.",
    example: "A loop többször fut le."
  },
  "condition": {
    meaning: "Feltétel alapú döntés.",
    example: "Az if condition ellenőrzi az értéket."
  }
};

function showSuggestions(value) {
  const box = document.getElementById("suggestions");
  box.innerHTML = "";

  if (!value) return;

  const matches = Object.keys(dictionary).filter(word =>
    word.includes(value)
  );

  matches.forEach(word => {
  const div = document.createElement("div");
  div.className = "suggestion";
  div.innerText = word;

  div.onclick = () => {
    document.getElementById("input").value = word;
    box.innerHTML = "";
    search();
  };

  box.appendChild(div);
});
}
let lastText = "";

// KERESÉS
function search() {
  const word = document.getElementById("input").value.toLowerCase().trim();
  const result = document.getElementById("result");

  if (!word) {
    result.innerText = "Írj be egy szót.";
    return;
  }

  if (dictionary[word]) {
    lastText = dictionary[word].meaning;

    result.innerHTML = `
      <b>${word}</b><br><br>
      ${dictionary[word].meaning}<br><br>
      <i>${dictionary[word].example}</i>
    `;
   { else {
   result.innerHTML = "🤖 AI válasz betöltése...";

   fetch("https://eoxandha57qtqfr.m.pipedream.net", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ word: word })
  })
  .then(res => res.json())
  .then(data => {
    console.log(data);

    let aiText = data.text || "Nincs válasz";

    lastText = aiText;

    result.innerHTML = `
      <b>${word}</b><br><br>
      ${aiText}
    `;
  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "⚠️ AI nem elérhető";
  });
}
  result.innerHTML = `
    <b>${word}</b><br><br>
    ${aiText}
  `;
})
.catch(err => {
  console.log(err);
  result.innerHTML = "⚠️ AI nem elérhető";
});
  }
}
// ENTER = azonnali keresés
document.getElementById("input").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  showSuggestions(value);
  search();
});

// 🎤 HANG FELISMERÉS
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "hu-HU";

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    search();
  };

  recognition.start();
}

// 🔊 FELolvasás
function speak() {
  if (!lastText) return;

  const speech = new SpeechSynthesisUtterance(lastText);
  speech.lang = "hu-HU";
  speechSynthesis.speak(speech);
}
function fakeAI(word) {
  return `A "${word}" egy olyan kifejezés, amely az informatikában használatos. 
Általában egy rendszer, folyamat vagy technológia része.`;
}
</script>

</body>
</html>
